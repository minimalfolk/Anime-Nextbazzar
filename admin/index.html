<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>PagesCMS Admin</title>
  <style>
    body {
      font-family: Arial;
      display: flex;
      height: 100vh;
      margin: 0;
    }
    .sidebar {
      width: 30%;
      border-right: 1px solid #ddd;
      padding: 10px;
    }
    .editor {
      flex: 1;
      padding: 10px;
    }
    textarea {
      width: 100%;
      height: 80vh;
    }
    button {
      margin-top: 10px;
      padding: 8px 12px;
    }
  </style>
</head>
<body>

<div class="sidebar">
  <h3>Posts</h3>
  <div id="fileList">Loading...</div>
</div>

<div class="editor">
  <h3>Edit File</h3>
  <input id="fileName" placeholder="filename.md" style="width:100%" />
  <textarea id="content"></textarea>
  <br>
  <button onclick="saveFile()">Save</button>
</div>

<script src="config.js"></script>
<script src="app.js"></script>

</body>
</html>
